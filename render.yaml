services:
  - type: web
    name: hive-boost-bot
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: BOT_USERNAME
        sync: false
      - key: BOT_POSTING_KEY
        sync: false
      - key: BASE_AMOUNT
        value: "1"
      - key: BASE_VOTE_PERCENT
        value: "50"
      - key: MAX_VOTES_PER_DAY
        value: "200"
      - key: MAX_VOTE_PERCENT
        value: "100"
    disk:
      name: data
      mountPath: /opt/render/project/src/db
      sizeGB: 1
